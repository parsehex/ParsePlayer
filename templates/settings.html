{% extends "base.html" %}

{% block content %}
<section>
  <article class="settings-panel">
    <div class="section-header">
      <h2>Settings</h2>
      <form method="get" action="{{ url_for('main.index') }}">
        <button type="submit" class="outline">Back</button>
      </form>
    </div>

    <p class="sync-summary">
      <strong>{{ selected_count }}</strong> selected
      <span class="summary-sep">|</span>
      <strong>{{ selected_size_human }}</strong>
    </p>

    <h3>Library Scan</h3>
    <form method="post" action="{{ url_for('main.scan_library') }}" class="scan-form settings-form">
      <input type="hidden" name="return_to" value="main.settings" />
      <label for="source_path">Source Folder</label>
      <div class="inline-field-row">
        <input id="source_path" name="source_path" value="{{ music_root }}" />
        <button type="submit">Scan</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
